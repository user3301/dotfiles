# Lazygit configuration
# Managed by dotfiles and symlinked to ~/.config/lazygit/config.yml
# (Home Manager mkOutOfStoreSymlink on NixOS, GNU Stow elsewhere)

git:
  # Use delta as the diff pager inside lazygit.
  # Lazygit does its own scrolling, so delta must not start its own pager
  # (--paging=never) and must be told to always emit color (colorArg: always).
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never
